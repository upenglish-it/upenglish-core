<nz-modal
  [(nzVisible)]="showModal"
  nzCentered
  [nzWidth]="'400px'"
  [nzTitle]="courseFormGroup.value._id ? 'Manage Course' : 'Add New Course'"
  [nzFooter]="footerTemplate"
  (nzOnOk)="onCreate()"
  [nzMaskClosable]="false"
  (nzOnCancel)="toggle()"
  [nzBodyStyle]="{ padding: '0px' }">
  <ng-container *nzModalContent>
    <form class="px-4 py-3 flex-col max-h-[500px] space-y-3 flex-1 flex overflow-auto mini-scroll-bar min-h-fit" [formGroup]="courseFormGroup">
      <div class="space-y-1.5">
        <label class="font-normal text-gray-600 text-xs required">Course Name</label>
        <input nz-input placeholder="Type here" formControlName="name" />
        <ng-container *ngIf="courseFormGroup.get('name').touched">
          <p class="isms-error-message" *ngIf="courseFormGroup.get('name').hasError('required')">Name is required</p>
        </ng-container>
      </div>
      <div class="space-y-1.5">
        <label class="font-normal text-gray-600 text-xs required">Monthly Price</label>
        <nz-input-number formControlName="price" style="width: 100%" [nzMin]="0" [nzStep]="1" [nzFormatter]="formatterVND" [nzParser]="parserVND"></nz-input-number>
        <ng-container *ngIf="courseFormGroup.get('price').touched">
          <p class="isms-error-message" *ngIf="courseFormGroup.get('price').hasError('required')">Price is required</p>
        </ng-container>
      </div>
      <div class="space-y-1.5">
        <label class="font-normal text-gray-600 text-xs required">Hourly (Monthly)</label>
        <nz-input-number formControlName="hourlyMonthlyPrice" style="width: 100%" [nzMin]="0" [nzStep]="1" [nzFormatter]="formatterVND" [nzParser]="parserVND"></nz-input-number>
        <ng-container *ngIf="courseFormGroup.get('hourlyMonthlyPrice').touched">
          <p class="isms-error-message" *ngIf="courseFormGroup.get('hourlyMonthlyPrice').hasError('required')">Price is required</p>
        </ng-container>
      </div>
      <div class="space-y-1.5">
        <label class="font-normal text-gray-600 text-xs required">Hourly (Package)</label>
        <nz-input-number formControlName="hourlyPackagePrice" style="width: 100%" [nzMin]="0" [nzStep]="1" [nzFormatter]="formatterVND" [nzParser]="parserVND"></nz-input-number>
        <ng-container *ngIf="courseFormGroup.get('hourlyPackagePrice').touched">
          <p class="isms-error-message" *ngIf="courseFormGroup.get('hourlyPackagePrice').hasError('required')">Price is required</p>
        </ng-container>
      </div>
      <div class="space-y-1.5">
        <label class="font-normal text-gray-600 text-xs required">Item</label>
        <nz-select formControlName="material" nzPlaceHolder="Select item" nzShowSearch class="w-full" [nzDropdownMatchSelectWidth]="false">
          <nz-option *ngFor="let material of materials" [nzLabel]="material.name" [nzValue]="material._id"> </nz-option>
        </nz-select>
      </div>
    </form>
  </ng-container>
  <ng-template #footerTemplate>
    <div class="space-x-2 flex items-center">
      <button nz-button nzBlock (click)="toggle()">Close</button>
      <button nz-button nzType="primary" (click)="onCreate()" [nzLoading]="loading" nzBlock [disabled]="courseFormGroup.invalid" *ngIf="!courseFormGroup.value._id">Submit</button>
      <button nz-button nzType="primary" (click)="onUpdate()" [nzLoading]="loading" nzBlock [disabled]="courseFormGroup.invalid" *ngIf="courseFormGroup.value._id"
        >Save Changes</button
      >
    </div>
  </ng-template>
</nz-modal>
