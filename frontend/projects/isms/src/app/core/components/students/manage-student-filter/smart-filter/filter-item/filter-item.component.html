<ng-container *ngIf="filterFormArray.length > 0" >
  <div class="flex flex-col">
    <span class="text-xs md:text-sm text-gray-500 font-weight-regular mb-2 md:mb-3">Compose a filter condition to get the results</span>
    <ng-container *ngFor="let form of filterFormArray.controls; let i = index">
      <div class="flex items-start mb-2 md:mb-0">
        <div class="flex justify-center items-center flex-col" *ngIf="toFormGroup(form).value.sequenceOperator">
          <div class="w-[1px] h-2 md:h-3 bg-gray-200"></div>
          <div>
            <span class="text-gray-400 text-[10px] md:text-xs py-0.5 px-1 md:px-1.5 rounded-full bg-gray-100">{{ toFormGroup(form).value.sequenceOperator?.name || 'And' }}</span>
          </div>
          <div class="w-[1px] h-2 md:h-3 bg-gray-200"></div>
        </div>
      </div>
      <!-- Filter Fields -->
      <div class="flex flex-row md:items-center gap-2 mb-3 md:mb-0" *ngIf="toFormGroup(form)">
        <!-- Parameter -->
        <isms-filter-item-parameter class="flex " [filter-form-group]="toFormGroup(form)"> </isms-filter-item-parameter>
        <!--Operator -->
        <ng-container *ngIf="hideOperator(toFormGroup(form).value.parameter.value)">
          <isms-filter-item-operator class="flex " [filter-form-group]="toFormGroup(form)"> </isms-filter-item-operator>
        </ng-container>
        <!-- Value -->
        <isms-filter-item-value class="flex " [filter-form-group]="toFormGroup(form)"> </isms-filter-item-value>
        <!-- Delete -->
        <div class="flex md:grid md:place-items-center justify-end md:justify-center" *ngIf="filterFormArray.controls.length > 1" nz-popconfirm nzPopconfirmTitle="Delete this?" (nzOnConfirm)="removeFilterFormGroup(i)">
          <i class="text-sm md:text-base text-gray-300 cursor-pointer ph-fill ph-trash hover:text-red-300"></i>
        </div>
      </div>
    </ng-container>
  </div>
  <div class="pt-3 md:pt-4">
    <button nz-button (click)="addTriggerFilter({ value: 'and', name: 'And' })" class="text-gray-500 flex space-x-2 items-center w-full md:w-auto justify-center md:justify-start">
      <span class="text-xs md:text-sm"> Add New Condition </span>
      <i class="cursor-pointer ph ph-plus text-sm md:text-base"></i>
    </button>
  </div>
</ng-container>

<ng-container *ngIf="filterFormArray.length === 0">
  <div class="flex h-64 md:h-96 items-center justify-center flex-col space-y-3 md:space-y-4 px-4">
    <img src="assets/images/illustrations/examining.svg" class="w-40 md:w-56" alt="" draggable />
    <div class="flex flex-col space-y-2 md:space-y-3 items-center justify-center">
      <p class="text-xs md:text-sm text-gray-500 text-center px-2">A great place to filter the students. Smart filter will help to get the better results</p>
      <button nz-button (click)="addTriggerFilter({ value: 'and', name: 'And' })" class="text-gray-500 flex space-x-2 items-center w-full sm:w-auto justify-center">
        <span class="text-xs md:text-sm"> Add New Condition </span>
        <i class="cursor-pointer ph ph-plus text-sm md:text-base"></i>
      </button>
    </div>
  </div>
</ng-container>
