<nz-modal
  [(nzVisible)]="showModal"
  nzCentered
  [nzWidth]="'400px'"
  [nzTitle]="classTimeFormGroup.value._id ? 'Manage Time' : 'Add New Time'"
  [nzFooter]="footerTemplate"
  (nzOnOk)="onCreate()"
  [nzMaskClosable]="false"
  (nzOnCancel)="toggle()"
  [nzBodyStyle]="{ padding: '0px' }">
  <ng-container *nzModalContent>
    <form class="px-4 py-3 flex-col max-h-[500px] space-y-3 flex-1 flex overflow-auto mini-scroll-bar min-h-fit" [formGroup]="classTimeFormGroup">
      <div class="space-y-1.5">
        <label class="font-normal text-gray-600 text-xs required">Name</label>
        <input nz-input placeholder="Type here" formControlName="name" />
        <ng-container *ngIf="classTimeFormGroup.get('name').touched">
          <p class="isms-error-message" *ngIf="classTimeFormGroup.get('name').hasError('required')">Name is required</p>
        </ng-container>
      </div>
      <div class="flex space-x-2">
        <div class="space-y-1.5 flex-1 flex flex-col">
          <label class="font-normal text-gray-600 text-xs">From Time</label>
          <nz-time-picker formControlName="from" nzFormat="hh:mm"></nz-time-picker>
          <ng-container *ngIf="classTimeFormGroup.get('from').touched">
            <p class="isms-error-message" *ngIf="classTimeFormGroup.get('from').hasError('required')">From is required</p>
          </ng-container>
        </div>
        <div class="space-y-1.5 flex-1 flex flex-col">
          <label class="font-normal text-gray-600 text-xs">To Time</label>
          <nz-time-picker formControlName="to" nzFormat="hh:mm"></nz-time-picker>
          <ng-container *ngIf="classTimeFormGroup.get('to').touched">
            <p class="isms-error-message" *ngIf="classTimeFormGroup.get('to').hasError('required')">To is required</p>
          </ng-container>
        </div>
      </div>
    </form>
  </ng-container>
  <ng-template #footerTemplate>
    <div class="space-x-2 flex items-center">
      <button nz-button nzBlock (click)="toggle()">Close</button>
      <button nz-button nzType="primary" (click)="onCreate()" [nzLoading]="loading" nzBlock [disabled]="classTimeFormGroup.invalid" *ngIf="!classTimeFormGroup.value._id"
        >Submit</button
      >
      <button nz-button nzType="primary" (click)="onUpdate()" [nzLoading]="loading" nzBlock [disabled]="classTimeFormGroup.invalid" *ngIf="classTimeFormGroup.value._id"
        >Save Changes</button
      >
    </div>
  </ng-template>
</nz-modal>
