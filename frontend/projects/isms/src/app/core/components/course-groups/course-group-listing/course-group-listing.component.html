<div class="h-[55px] bg-white justify-between flex border-b items-center px-4">
  <div class="flex items-center flex-1 space-x-4">
    <div class="max-w-sm w-full" [formGroup]="filterFormGroup">
      <nz-input-group [nzPrefix]="searchPrefixTemplate" [nzSuffix]="searchSuffixTemplate" class="space-x-1.5">
        <input nz-input placeholder="Search for: Name" nzShape="round" formControlName="searchQuery" />
      </nz-input-group>
      <ng-template #searchPrefixTemplate>
        <span class="text-base cursor-pointer text-gray-400 ph ph-magnifying-glass"></span>
      </ng-template>
      <ng-template #searchSuffixTemplate>
        <span nz-icon class="ant-input-clear-icon" nzTheme="fill" nzType="close-circle"></span>
      </ng-template>
    </div>
  </div>
  <div class="space-x-6 flex items-center">
    <div class="space-x-2 flex items-center">
      <button nz-button nzType="primary" (click)="addCourseGroupModal.toggle()">
        Add New Course Group
        <span nz-icon nzType="down" nzTheme="outline"></span>
      </button>
    </div>
  </div>
</div>

<div class="overflow-y-auto bg-white mini-scroll-bar flex-1 h-[calc(100vh-210px)] lg:h-[calc(100vh-110px)]" reach-scroll-to-bottom (on-reach)="loadData()">
  <div class="overflow-x-auto">
  <table role="table" class="min-w-full divide-y divide-gray-200 isms-table">
      <thead class="bg-gray-50 sticky top-0 z-10">
      <tr class="font-bold text-gray-700">
          <th class="w-10 px-2 md:px-4 py-2 md:py-3">
          <div class="relative grid place-items-center">
            <!-- <label nz-checkbox (nzCheckedChange)="onAllCandidateChecked($event)" class="absolute top-[-11px]"></label> -->
            #
          </div>
        </th>
          <th class="px-2 md:px-4 py-2 md:py-3 text-left text-xs md:text-sm min-w-[150px]">
          <div class="flex items-center justify-between">Name</div>
        </th>
          <th class="px-2 md:px-4 py-2 md:py-3 text-left text-xs md:text-sm min-w-[200px]">
          <div class="flex items-center justify-between">Courses</div>
        </th>
          <th class="px-2 md:px-4 py-2 md:py-3 text-left text-xs md:text-sm min-w-[160px]">
          <div class="flex items-center justify-between">Created Date</div>
        </th>
          <th class="px-2 md:px-4 py-2 md:py-3 text-left text-xs md:text-sm min-w-[100px]"></th>
      </tr>
    </thead>
    <tbody class="text-sm bg-white divide-y divide-gray-200">
      <tr *ngFor="let course of filteredCourseGroups; trackBy: identify; let i = index">
          <td class="px-2 md:px-4 py-2 md:py-3">
          <div class="relative grid place-items-center">
            <!-- <label nz-checkbox [(ngModel)]="course.selected" class="absolute top-[-11px]"></label> -->
            {{ i + 1 }}
          </div>
        </td>

          <td class="px-2 md:px-4 py-2 md:py-3">
            <div class="flex items-center space-x-2 md:space-x-3">
              <span class="text-xs font-normal text-gray-700 cursor-pointer truncate" (click)="onEdit(course._id)"> {{ course.name }} </span>
          </div>
        </td>

          <td class="px-2 md:px-4 py-2 md:py-3 font-normal text-xs text-gray-500">
            <div class="flex flex-wrap gap-1 md:gap-2">
              <nz-tag [nzColor]="'green'" class="text-[10px] md:text-xs" *ngFor="let course of course.courses">{{ course.name }}</nz-tag>
            </div>
        </td>

          <td class="px-2 md:px-4 py-2 md:py-3 font-normal text-xs text-gray-500 whitespace-nowrap">{{ course.createdAt | date: "MM/d/YY • hh:mm a" }}</td>

          <td class="px-2 md:px-4 py-2 md:py-3 font-normal text-xs text-gray-500">
          <button
            nz-button
            nzType="link"
            nzSize="small"
            nz-popconfirm
            nzPopconfirmTitle="Delete this?"
            nzPopconfirmPlacement="bottom"
            (nzOnConfirm)="onDelete(course._id)"
              (nzOnCancel)="(1)"
              class="text-[10px] md:text-xs">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
  </div>
</div>

<isms-add-course-group-modal #addCourseGroupModal (on-submitted)="loadData()"></isms-add-course-group-modal>
