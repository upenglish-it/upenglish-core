<nz-modal
  [(nzVisible)]="showModal"
  nzCentered
  [nzWidth]="'400px'"
  [nzTitle]="courseGroupFormGroup.value._id ? 'Manage Course Group' : 'Add New Course Group'"
  [nzFooter]="footerTemplate"
  (nzOnOk)="onCreate()"
  [nzMaskClosable]="false"
  (nzOnCancel)="toggle()"
  [nzBodyStyle]="{ padding: '0px' }">
  <ng-container *nzModalContent>
    <form class="px-4 py-3 flex-col max-h-[500px] space-y-3 flex-1 flex overflow-auto mini-scroll-bar min-h-fit" [formGroup]="courseGroupFormGroup">
      <div class="space-y-1.5">
        <label class="font-normal text-gray-600 text-xs required">Name</label>
        <input nz-input placeholder="Type here" formControlName="name" />
        <ng-container *ngIf="courseGroupFormGroup.get('name').touched">
          <p class="isms-error-message" *ngIf="courseGroupFormGroup.get('name').hasError('required')">Name is required</p>
        </ng-container>
      </div>
      <div class="space-y-1.5 flex-1">
        <label class="font-normal text-gray-600 text-xs"> Courses </label>
        <nz-select formControlName="courses" nzShowSearch nzMode="multiple" class="w-full" nzPlaceHolder="Select courses" [nzDropdownMatchSelectWidth]="false">
          <nz-option *ngFor="let course of courses" [nzLabel]="course.name" [nzValue]="course._id"></nz-option>
        </nz-select>
        <ng-container *ngIf="courseGroupFormGroup.get('courses').touched">
          <p class="isms-error-message" *ngIf="courseGroupFormGroup.get('courses').hasError('required')">Courses is required</p>
        </ng-container>
      </div>
    </form>
  </ng-container>
  <ng-template #footerTemplate>
    <div class="space-x-2 flex items-center">
      <button nz-button nzBlock (click)="toggle()">Close</button>
      <button nz-button nzType="primary" (click)="onCreate()" [nzLoading]="loading" nzBlock [disabled]="courseGroupFormGroup.invalid" *ngIf="!courseGroupFormGroup.value._id"
        >Submit</button
      >
      <button nz-button nzType="primary" (click)="onUpdate()" [nzLoading]="loading" nzBlock [disabled]="courseGroupFormGroup.invalid" *ngIf="courseGroupFormGroup.value._id"
        >Save Changes</button
      >
    </div>
  </ng-template>
</nz-modal>
