<div class="flex items-center justify-center w-full">
  <label
    *ngIf="!value"
    for="dropzone-file"
    class="flex flex-col items-center justify-center w-full h-64 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 dark:hover:bg-bray-800 dark:bg-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:hover:border-gray-500 dark:hover:bg-gray-600">
    <div class="flex flex-col items-center justify-center pt-5 pb-6">
      <svg aria-hidden="true" class="w-10 h-10 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
      </svg>
      <p class="mb-2 text-sm text-gray-500 dark:text-gray-400"><span class="font-semibold">Click to upload</span> or drag and drop</p>
      <p class="text-xs text-gray-500 dark:text-gray-400">SVG, PNG, JPG or GIF (MAX. 800x400px)</p>
    </div>
    <input id="dropzone-file" type="file" class="hidden" accept=".doc,.docx,.pdf,.odt,.rtf,.txt,.jpg,.jpeg,.png" (change)="onFileChange($event)" />
  </label>

  <ng-container *ngIf="value">
    <div class="flex items-center border rounded-md p-2 w-full space-x-3">
      <div class="grid w-8 h-8 text-lg rounded-full bg-opacity-20 place-items-center text-gray-500 bg-gray-400">
        <span class="ph-duotone ph-read-cv-logo"></span>
      </div>
      <div class="flex flex-col flex-1">
        <span class="font-medium text-gray-600">{{ value.fileName }}</span>
        <span class="text-xs text-gray-400">{{ value.size | formattedFileSize }}</span>
      </div>
      <div>
        <div
          class="h-6 w-6 rounded-full hover:bg-error-400 text-gray-500 hover:border-error-500 transition-all hover:text-white grid place-items-center bg-white border cursor-pointer"
          (click)="(1)">
          <span class="ph-bold ph-trash"></span>
        </div>
      </div>
    </div>
  </ng-container>
</div>
