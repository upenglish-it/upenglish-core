<nz-modal
  [(nzVisible)]="showModal"
  nzCentered
  [nzWidth]="'400px'"
  [nzTitle]="titleTemplate"
  [nzFooter]="footerTemplate"
  (nzOnOk)="onCreate()"
  [nzMaskClosable]="false"
  (nzOnCancel)="toggle()"
  [nzBodyStyle]="{ padding: '0px' }">
  <ng-container *nzModalContent>
    <form class="px-4 py-3 flex-col max-h-[500px] space-y-3 flex-1 flex overflow-auto mini-scroll-bar min-h-fit" [formGroup]="sourceFormGroup">
      <div class="space-y-1.5">
        <label class="font-normal text-gray-600 text-xs required">Source Value</label>
        <input nz-input placeholder="Type here" formControlName="value" />
        <ng-container *ngIf="sourceFormGroup.get('value').touched">
          <p class="isms-error-message" *ngIf="sourceFormGroup.get('value').hasError('required')">Value is required</p>
        </ng-container>
      </div>
    </form>
  </ng-container>
  <ng-template #titleTemplate>
    {{ sourceFormGroup.value._id ? "Manage Source" : "Add New Source" }}
  </ng-template>
  <ng-template #footerTemplate>
    <div class="space-x-2 flex items-center">
      <button nz-button nzBlock (click)="toggle()">Close</button>
      <button nz-button nzType="primary" (click)="onCreate()" [nzLoading]="loading" nzBlock [disabled]="sourceFormGroup.invalid" *ngIf="!sourceFormGroup.value._id">Submit</button>
      <button nz-button nzType="primary" (click)="onUpdate()" [nzLoading]="loading" nzBlock [disabled]="sourceFormGroup.invalid" *ngIf="sourceFormGroup.value._id"
        >Save Changes</button
      >
    </div>
  </ng-template>
</nz-modal>
