<nz-modal
  [(nzVisible)]="showModal"
  nzCentered
  [nzWidth]="'400px'"
  [nzTitle]="titleTemplate"
  [nzFooter]="footerTemplate"
  (nzOnOk)="onCreate()"
  [nzMaskClosable]="false"
  (nzOnCancel)="toggle()"
  [nzBodyStyle]="{ padding: '0px' }">
  <ng-container *nzModalContent>
    <form class="px-4 py-3 flex-col max-h-[500px] space-y-3 flex-1 flex overflow-auto mini-scroll-bar min-h-fit" [formGroup]="tagFormGroup">
      <div class="space-y-1.5">
        <label class="font-normal text-gray-600 text-xs required">Tag Value</label>
        <input nz-input placeholder="Type here" formControlName="value" />
        <ng-container *ngIf="tagFormGroup.get('value').touched">
          <p class="isms-error-message" *ngIf="tagFormGroup.get('value').hasError('required')">Value is required</p>
        </ng-container>
      </div>
      <div class="space-y-1.5 flex flex-col">
        <label class="font-normal text-gray-600 text-xs required">Color</label>
        <div>
          <nz-color-picker nzSize="small" formControlName="color" nzDefaultValue="#f6f8f9"></nz-color-picker>
        </div>
        <ng-container *ngIf="tagFormGroup.get('color').touched">
          <p class="isms-error-message" *ngIf="tagFormGroup.get('color').hasError('required')">Color is required</p>
        </ng-container>
      </div>

      <div class="space-y-1.5 flex flex-col">
        <label class="font-normal text-gray-600 text-xs required">Color</label>
        <div>
          <nz-select formControlName="type" nzShowSearch class="w-full" nzPlaceHolder="Select type" [nzDropdownMatchSelectWidth]="false">
            <nz-option *ngFor="let type of types" [nzLabel]="type.name" [nzValue]="type.value"></nz-option>
          </nz-select>
        </div>
        <ng-container *ngIf="tagFormGroup.get('color').touched">
          <p class="isms-error-message" *ngIf="tagFormGroup.get('color').hasError('required')">Color is required</p>
        </ng-container>
      </div>
    </form>
  </ng-container>
  <ng-template #titleTemplate>
    {{ tagFormGroup.value._id ? "Manage Tag" : "Add New Tag" }}
  </ng-template>
  <ng-template #footerTemplate>
    <div class="space-x-2 flex items-center">
      <button nz-button nzBlock (click)="toggle()">Close</button>
      <button nz-button nzType="primary" (click)="onCreate()" [nzLoading]="loading" nzBlock [disabled]="tagFormGroup.invalid" *ngIf="!tagFormGroup.value._id">Submit</button>
      <button nz-button nzType="primary" (click)="onUpdate()" [nzLoading]="loading" nzBlock [disabled]="tagFormGroup.invalid" *ngIf="tagFormGroup.value._id">Save Changes</button>
    </div>
  </ng-template>
</nz-modal>
