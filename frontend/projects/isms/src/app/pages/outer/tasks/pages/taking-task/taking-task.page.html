<isms-confirm-take-task-modal *ngIf="stepView === 'preparing-task'" (on-generated)="onGenerated($event)" #confirmTakeTaskModal></isms-confirm-take-task-modal>
<isms-taking-task *ngIf="stepView === 'taking-task'" [submission-id]="submissionId" (on-completed)="onCompleted($event)"></isms-taking-task>
<isms-task-result
  *ngIf="stepView === 'finished-task'"
  from-page="student-taking-task"
  [submission-id]="submissionId"
  view-type="page"
  [start-reviewing-participant-answer]="true"></isms-task-result>

<script>
  (function (global) {
    if (typeof global === "undefined") {
      throw new Error("window is undefined");
    }

    var _hash = "!";
    var noBackPlease = function () {
      global.location.href += "#";

      // making sure we have the fruit available for juice....
      // 50 milliseconds for just once do not cost much (^__^)
      global.setTimeout(function () {
        global.location.href += "!";
      }, 50);
    };

    // Earlier we had setInerval here....
    global.onhashchange = function () {
      if (global.location.hash !== _hash) {
        global.location.hash = _hash;
      }
    };

    global.onload = function () {
      noBackPlease();

      // disables backspace on page except on input fields and textarea..
      document.body.onkeydown = function (e) {
        var elm = e.target.nodeName.toLowerCase();
        if (e.which === 8 && elm !== "input" && elm !== "textarea") {
          e.preventDefault();
        }
        // stopping event bubbling up the DOM tree..
        e.stopPropagation();
      };
    };

    // alert(2);
  })(window);
</script>
