<div class="h-full overflow-hidden flex flex-col w-full">
  <!-- <div class="h-[55px] bg-white justify-between flex border-b border-b-gray-200 items-center px-4 space-x-4 relative">
    <h6 class="text-base mb-0 font-medium text-gray-700 cursor-pointer">All Students ({{filteredStudents.length}})</h6>
  </div> -->

  <div class=" bg-white justify-between flex flex-col gap-4 lg:flex-row border-b border-b-gray-200 lg:items-center p-4 space-x-4 relative">
    <div class="w-full">
      <h6 class="text-base mb-0 font-medium text-gray-700 cursor-pointer">{{ segmentOptions[segmentIndex].label }}</h6>
      <span>{{ segmentOptions[segmentIndex].description }}</span>
    </div>
    <div class="flex items-center z-0">
      <isms-segmented-selector [options]="segmentOptions" [current-index]="segmentIndex" (on-changed)="onChangeSegmentSelector($event)"> </isms-segmented-selector>
    </div>

    <div class="hidden lg:flex lg:w-full"></div>
  </div>

  <ng-container *ngIf="segmentIndex === 0">
    <isms-staff-listing></isms-staff-listing>
  </ng-container>

  <ng-container *ngIf="segmentIndex === 1">
    <isms-manage-salary-listing></isms-manage-salary-listing>
  </ng-container>

  <ng-container *ngIf="segmentIndex === 2">
    <isms-leave-tracker-listing></isms-leave-tracker-listing>
  </ng-container>
</div>
