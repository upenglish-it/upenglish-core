<div class="flex flex-col">
  <!-- <div class="h-[55px] bg-white justify-between flex border-b border-b-gray-200 items-center px-4 space-x-4 relative">
    <h6 class="text-base mb-0 font-medium text-gray-700 cursor-pointer">All Students ({{filteredStudents.length}})</h6>
  </div> -->

  <div class="bg-white justify-between flex flex-col lg:flex-row border-b border-b-gray-200 p-4 gap-4 relative">
    <div class="w-full">
      <h6 class="text-base mb-1 font-medium text-gray-700 cursor-pointer">{{ segmentOptions[segmentIndex].label }}</h6>
      <span>{{ segmentOptions[segmentIndex].description }}</span>
    </div>

    <!-- OLD (comment): Mobile -->
    <!-- NEW: Works for mobile and desktop -->
    <div class="flex items-center justify-center z-0 w-full">
      <isms-segmented-selector class="w-full" [options]="segmentOptions" [current-index]="segmentIndex" (on-changed)="onChangeSegmentSelector($event)"> </isms-segmented-selector>
    </div>

    <div class="hidden lg:flex lg:w-full"></div>

    <!-- I remove this one, causing duplicate segment selector -->
    <!-- Desktop -->
    <!-- <div class="flex items-center flex-1 box-content justify-center self-center z-0 sm:hidden absolute top-0 right-0 bottom-0 left-0 m-auto">
      <isms-segmented-selector [options]="segmentOptions" [current-index]="segmentIndex" (on-changed)="onChangeSegmentSelector($event)"> </isms-segmented-selector>
    </div> -->
  </div>

  <ng-container *ngIf="segmentIndex === 0">
    <isms-student-listing></isms-student-listing>
  </ng-container>

  <ng-container *ngIf="segmentIndex === 1">
    <isms-attendance-listing></isms-attendance-listing>
  </ng-container>

  <ng-container *ngIf="segmentIndex === 2">
    <isms-tuition-listing></isms-tuition-listing>
  </ng-container>
</div>
