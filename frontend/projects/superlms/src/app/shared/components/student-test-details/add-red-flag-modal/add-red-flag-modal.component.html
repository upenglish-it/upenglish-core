<nz-modal
  [(nzVisible)]="showModal"
  [nzWidth]="'600px'"
  [nzTitle]="redFlagFormGroup.value._id ? 'Edit Red Flag' : 'Create Red Flag'"
  [nzMaskClosable]="false"
  [nzClosable]="false"
  nzCancelText="Close"
  (nzOnCancel)="toggle()"
  [nzOkText]="redFlagFormGroup.value._id ? 'Save' : 'Create'"
  (nzOnOk)="onSubmit()"
  [nzOkDisabled]="redFlagFormGroup.invalid"
  [nzBodyStyle]="{ padding: '0px' }">
  <ng-container *nzModalContent>
    <form class="px-4 py-3 flex-col max-h-[500px] space-y-3 flex-1 flex overflow-auto mini-scroll-bar min-h-fit" [formGroup]="redFlagFormGroup">
      <div class="space-y-1.5 flex-1">
        <label class="slms-label slms-required">Message</label>
        <textarea nz-input formControlName="message" class="resize-none" [nzAutosize]="{ minRows: 10 }" placeholder="Type the red flag message here..."></textarea>
      </div>
    </form>
  </ng-container>
</nz-modal>
