<div class="bg-white h-screen grid place-items-center">
  <div class="max-w-md w-full border rounded-md m-auto p-6 flex flex-col gap-6 bg-white shadow-xl">
    <img src="/assets/images/logo-nav.png" alt="Logo" class="w-36 mx-auto mb-2" />
    <div class="grid grid-cols-1 gap-4">
      @for (field of accountFields; track field.id) {
        <div class="flex items-center gap-2">
          <span class="font-bold w-32">{{ field.name }}:</span>
          <span>{{ field.value }}</span>
        </div>
      }
    </div>

    <p>If your details aren't incorrect, please contact support.</p>

    <button nz-button nzType="primary" (click)="proceed()">My details are correct</button>
  </div>
</div>
