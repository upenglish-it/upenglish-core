<div class="max-w-7xl w-full mx-auto flex flex-col gap-10">
  <div class="flex items-center gap-6 pt-14">
    <img profile-photo [photo]="accountService.account.profilePhoto" [letter]="accountService.account.firstName[0]" class="bg-gray-300 rounded-full h-28 w-28 object-cover" />
    <div class="flex flex-col gap-4">
      <h2 class="font-bold text-2xl mb-0">{{ accountService.account.firstName }} {{ accountService.account.lastName }}</h2>
      <h3 class="text-gray-500">Branch: {{ this.accountService.selectedBranch?.name || "---" }} </h3>
    </div>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-2 gap-4">
    @for (field of accountFields; track field.id) {
      <div class="flex items-center gap-2">
        <span class="font-bold w-32">{{ field.name }}:</span>
        <span>{{ field.value }}</span>
      </div>
    }
  </div>

  <slms-course-list redirection-path="/s/classes" [classes]="enrolledClasses"></slms-course-list>

</div>
