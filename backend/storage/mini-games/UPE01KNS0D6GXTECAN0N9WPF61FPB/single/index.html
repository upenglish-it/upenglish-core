<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperStudy Playable Test Game</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f3f6fb;
      color: #132033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.15), transparent 34%),
        linear-gradient(180deg, #f8fbff 0%, #eef2ff 100%);
      padding: 24px;
    }

    .game-shell {
      width: min(92vw, 860px);
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(59, 130, 246, 0.14);
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.16);
      padding: 28px;
    }

    .hero {
      margin-bottom: 22px;
    }

    .badge {
      display: inline-flex;
      padding: 7px 12px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      margin: 16px 0 8px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      color: #475569;
      line-height: 1.55;
      font-size: 15px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }

    .status-card {
      background: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: 18px;
      padding: 16px;
    }

    .status-label {
      display: block;
      margin-bottom: 7px;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .status-value {
      font-size: 20px;
      color: #0f172a;
    }

    .question-card {
      min-height: 320px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 24px;
    }

    .question-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      color: #64748b;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .question-text {
      margin: 0 0 10px;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.2;
      color: #0f172a;
    }

    .question-hint {
      margin: 0 0 22px;
      font-size: 15px;
      line-height: 1.55;
      color: #475569;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option-btn {
      width: 100%;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #0f172a;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .option-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #60a5fa;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.08);
    }

    .option-btn.selected {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .option-btn.correct {
      border-color: #16a34a;
      background: #ecfdf5;
    }

    .option-btn.incorrect {
      border-color: #dc2626;
      background: #fef2f2;
    }

    .feedback-panel {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .feedback-panel strong {
      display: block;
      margin-bottom: 6px;
      color: #0f172a;
    }

    .feedback-panel p {
      margin: 0;
      color: #475569;
      line-height: 1.55;
    }

    .action-row {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    button.primary {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: #ffffff;
    }

    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .empty-state,
    .result-card {
      min-height: 270px;
      display: grid;
      place-content: center;
      gap: 8px;
      text-align: center;
    }

    .empty-state h2,
    .result-card h2 {
      margin: 0;
      font-size: 26px;
      color: #0f172a;
    }

    .empty-state p,
    .result-card p {
      margin: 0;
      color: #475569;
      line-height: 1.55;
    }

    .result-score {
      margin-top: 8px;
      font-size: 42px;
      font-weight: 800;
      color: #1d4ed8;
    }

    code {
      background: #e2e8f0;
      border-radius: 8px;
      padding: 2px 6px;
    }

    @media (max-width: 720px) {
      body {
        padding: 14px;
      }

      .game-shell {
        width: 100%;
        padding: 18px;
        border-radius: 22px;
      }

      .status-grid {
        grid-template-columns: 1fr;
      }

      .question-card {
        padding: 18px;
      }

      .action-row {
        flex-direction: column-reverse;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="hero">
      <span class="badge">SuperStudy Mini Game</span>
      <h1 id="gameTitle">Waiting for game data...</h1>
      <p id="gameSubtitle">Open this through the launcher to start the quiz.</p>
    </section>

    <section class="status-grid">
      <article class="status-card">
        <span class="status-label">Mode</span>
        <strong class="status-value" id="modeValue">Unknown</strong>
      </article>
      <article class="status-card">
        <span class="status-label">Progress</span>
        <strong class="status-value" id="progressValue">0 / 0</strong>
      </article>
      <article class="status-card">
        <span class="status-label">Score</span>
        <strong class="status-value" id="scoreValue">0</strong>
      </article>
    </section>

    <section class="question-card" id="questionCard">
      <div class="empty-state">
        <h2>Launcher payload not loaded yet</h2>
        <p>The game will render real questions once it receives <code>GAME_DATA</code>.</p>
      </div>
    </section>

    <section class="action-row">
      <button class="secondary" id="reloadBtn" type="button">Reload Data</button>
      <button class="primary" id="nextBtn" type="button" disabled>Start</button>
    </section>
  </main>

  <script>
    const state = {
      payload: null,
      questions: [],
      index: 0,
      score: 0,
      selectedOption: null,
      answered: false
    };

    const titleEl = document.getElementById('gameTitle');
    const subtitleEl = document.getElementById('gameSubtitle');
    const modeEl = document.getElementById('modeValue');
    const progressEl = document.getElementById('progressValue');
    const scoreEl = document.getElementById('scoreValue');
    const questionCardEl = document.getElementById('questionCard');
    const reloadBtn = document.getElementById('reloadBtn');
    const nextBtn = document.getElementById('nextBtn');

    function shuffle(values) {
      const items = [...values];
      for (let i = items.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function buildVocabularyQuestions(words = []) {
      const validWords = words.filter(item => item && item.word && item.meaning);

      return validWords.map((item, index) => {
        const distractors = shuffle(
          validWords
            .filter((candidate, candidateIndex) => candidateIndex !== index && candidate.meaning !== item.meaning)
            .map(candidate => candidate.meaning)
        ).slice(0, 3);

        const options = shuffle([item.meaning, ...distractors]);
        const correctIndex = options.findIndex(option => option === item.meaning);

        return {
          type: 'vocabulary',
          prompt: `What does "${item.word}" mean?`,
          hint: item.example
            ? `Example: ${item.example}${item.exampleTranslation ? ` - ${item.exampleTranslation}` : ''}`
            : (item.phonetic ? `Pronunciation: ${item.phonetic}` : 'Choose the correct meaning.'),
          options,
          correctIndex,
          explanation: item.wordType ? `Word type: ${item.wordType}` : 'Review the correct meaning before continuing.'
        };
      }).filter(question => question.options.length >= 2);
    }

    function buildGrammarQuestions(questions = []) {
      return questions
        .map(question => {
          const variation = (question && (question.primaryVariation || (question.variations || [])[0])) || null;
          if (!variation || !variation.text || !Array.isArray(variation.options) || typeof variation.correctAnswer !== 'number') {
            return null;
          }

          return {
            type: 'grammar',
            prompt: variation.text,
            hint: question.context || 'Choose the best answer.',
            options: variation.options,
            correctIndex: variation.correctAnswer,
            explanation: variation.explanation || 'Review the correct answer before continuing.'
          };
        })
        .filter(Boolean);
    }

    function updateStats() {
      const total = state.questions.length;
      const current = total ? Math.min(state.index + 1, total) : 0;
      progressEl.textContent = `${current} / ${total}`;
      scoreEl.textContent = String(state.score);
    }

    function setNextButtonLabel() {
      if (!state.questions.length) {
        nextBtn.textContent = 'Start';
        nextBtn.disabled = true;
        return;
      }

      if (!state.answered) {
        nextBtn.textContent = 'Check answer';
        nextBtn.disabled = state.selectedOption === null;
        return;
      }

      const isLast = state.index >= state.questions.length - 1;
      nextBtn.textContent = isLast ? 'Finish game' : 'Next question';
      nextBtn.disabled = false;
    }

    function renderResults() {
      const total = state.questions.length;
      questionCardEl.innerHTML = `
        <div class="result-card">
          <h2>Game complete</h2>
          <p>You finished the playable IT fixture using the live SuperStudy launcher payload.</p>
          <div class="result-score">${state.score} / ${total}</div>
          <p>${total ? `Accuracy: ${Math.round((state.score / total) * 100)}%` : 'No questions were generated.'}</p>
        </div>
      `;

      progressEl.textContent = `${total} / ${total}`;
      nextBtn.textContent = 'Replay';
      nextBtn.disabled = false;

      window.parent.postMessage({
        type: 'GAME_COMPLETE',
        summary: {
          message: 'Playable IT fixture completed successfully.',
          correctAnswers: state.score,
          totalQuestions: total
        }
      }, '*');
    }

    function renderQuestion() {
      const question = state.questions[state.index];
      if (!question) {
        renderResults();
        return;
      }

      updateStats();
      const optionMarkup = question.options
        .map((option, optionIndex) => {
          let classes = 'option-btn';
          if (state.selectedOption === optionIndex) classes += ' selected';
          if (state.answered && optionIndex === question.correctIndex) classes += ' correct';
          if (state.answered && state.selectedOption === optionIndex && optionIndex !== question.correctIndex) classes += ' incorrect';

          return `
            <button
              class="${classes}"
              type="button"
              data-option-index="${optionIndex}"
              ${state.answered ? 'disabled' : ''}
            >
              ${escapeHtml(option)}
            </button>
          `;
        })
        .join('');

      const feedbackMarkup = state.answered
        ? `
          <div class="feedback-panel">
            <strong>${state.selectedOption === question.correctIndex ? 'Correct' : 'Incorrect'}</strong>
            <p>${escapeHtml(question.explanation)}</p>
          </div>
        `
        : '';

      questionCardEl.innerHTML = `
        <div class="question-meta">
          <span>${escapeHtml(question.type)}</span>
          <span>Question ${state.index + 1}</span>
        </div>
        <h2 class="question-text">${escapeHtml(question.prompt)}</h2>
        <p class="question-hint">${escapeHtml(question.hint || '')}</p>
        <div class="options">${optionMarkup}</div>
        ${feedbackMarkup}
      `;

      questionCardEl.querySelectorAll('[data-option-index]').forEach(button => {
        button.addEventListener('click', () => {
          if (state.answered) return;
          state.selectedOption = Number(button.getAttribute('data-option-index'));
          renderQuestion();
          setNextButtonLabel();
        });
      });

      setNextButtonLabel();
    }

    function initializeGame(payload) {
      const dataType = payload && payload.dataType === 'grammar'
        ? 'grammar'
        : Array.isArray(payload && payload.questions) && payload.questions.length > 0 && (!Array.isArray(payload && payload.words) || payload.words.length === 0)
          ? 'grammar'
          : 'vocabulary';

      const questions = dataType === 'grammar'
        ? buildGrammarQuestions((payload && payload.questions) || [])
        : buildVocabularyQuestions((payload && payload.words) || []);

      state.payload = payload;
      state.questions = questions;
      state.index = 0;
      state.score = 0;
      state.selectedOption = null;
      state.answered = false;

      titleEl.textContent = dataType === 'grammar' ? 'Grammar Sprint' : 'Word Match Sprint';
      subtitleEl.textContent = questions.length > 0
        ? 'Answer each question, then finish the run to report completion back to SuperStudy.'
        : 'Payload loaded, but there were not enough valid items to build a playable quiz.';
      modeEl.textContent = dataType === 'grammar' ? 'Grammar' : 'Vocabulary';

      if (questions.length === 0) {
        progressEl.textContent = '0 / 0';
        scoreEl.textContent = '0';
        questionCardEl.innerHTML = `
          <div class="empty-state">
            <h2>No playable questions</h2>
            <p>The launcher payload arrived, but it did not contain enough valid items for this quiz format.</p>
          </div>
        `;
        nextBtn.textContent = 'Start';
        nextBtn.disabled = true;
        return;
      }

      renderQuestion();
    }

    reloadBtn.addEventListener('click', () => {
      window.parent.postMessage({ type: 'GAME_REQUEST_RELOAD' }, '*');
    });

    nextBtn.addEventListener('click', () => {
      if (!state.questions.length) return;

      if (!state.answered) {
        if (state.selectedOption === null) return;
        state.answered = true;
        if (state.selectedOption === state.questions[state.index].correctIndex) {
          state.score += 1;
        }
        renderQuestion();
        return;
      }

      if (state.index >= state.questions.length - 1) {
        state.index = state.questions.length;
        renderResults();
        return;
      }

      state.index += 1;
      state.selectedOption = null;
      state.answered = false;
      renderQuestion();
    });

    window.addEventListener('message', event => {
      if (!event.data || event.data.type !== 'GAME_DATA') return;
      initializeGame(event.data);
    });
  </script>
</body>
</html>
